name: Release
on:
  push:
    tags: "*"

env:
  DEDER_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
  DEDER_PGP_SECRET: ${{ secrets.PGP_SECRET }}
  DEDER_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
  DEDER_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

jobs:
  tests:
    uses: ./.github/workflows/ci.yml
  publish:
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install deder
        run: brew install sake92/tap/deder
      - name: Publish
        run: deder exec -t publish
      - name: Deder output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deder-logs
          path: |
            .deder/logs/server.log