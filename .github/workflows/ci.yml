
name: CI

on:
  push:
    branches: main
  pull_request:
  workflow_call:  # allow this workflow to be called from other workflows

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Compile
        run: ./mill -i __.compile
      - name: Test
        run: ./mill -i __.test
  test-deder:
    name: test-deder
    runs-on: ubuntu-latest
    continue-on-error: true # just playing for now
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install deder
        run: |
          brew install sake92/tap/deder
      - name: Compile
        run: |
          deder exec -t compile
          cat .deder/logs/server.log
      - name: Test Deder
        run: deder exec -t test
